name: Odyssey ticket monitor

on:
  schedule:
    # Every 20 minutes. NOTE: GitHub cron is UTC and often runs a few
    # minutes late — that's fine for this use case.
    - cron: "*/20 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

concurrency:
  group: monitor
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit state.json back

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check showtimes
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AMC_API_KEY: ${{ secrets.AMC_API_KEY }}
        run: python monitor.py

      - name: Persist state
        run: |
          git config user.name "monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update state [skip ci]"
          git push
